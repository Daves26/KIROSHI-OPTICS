<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KIROSHI OPTICS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background -->
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo" id="logoBtn">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M14 2C7.373 2 2 7.373 2 14s5.373 12 12 12 12-5.373 12-12S20.627 2 14 2z" fill="url(#lg1)" opacity=".9"/>
          <path d="M8 14c0-3.314 2.686-6 6-6M20 14c0 3.314-2.686 6-6 6" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity=".8"/>
          <defs>
            <linearGradient id="lg1" x1="2" y1="2" x2="26" y2="26" gradientUnits="userSpaceOnUse">
              <stop stop-color="#CF6679"/>
              <stop offset="1" stop-color="#7C4DFF"/>
            </linearGradient>
          </defs>
        </svg>
        <span>KIROSHI OPTICS</span>
      </div>

      <div class="search-pill">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search for movies, series…" autocomplete="off" spellcheck="false" />
        <button class="clear-btn" id="clearBtn" aria-label="Clear">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <a href="https://github.com/Daves26" target="_blank" rel="noopener noreferrer" class="gh-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.167 6.839 9.49.5.092.682-.217.682-.482 0-.237-.009-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
        </svg>
        Daves26
      </a>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">

    <!-- Home view -->
    <section id="homeView" class="view active">
      <div class="hero-text">
        <h1><em>KIROSHI</em></h1>
        <p>See the Unseen</p>
      </div>

      <!-- <div class="featured-grid">
        
        <div class="featured-card" data-id="1399" data-type="tv">
          <div class="card-media">
            <img src="https://image.tmdb.org/t/p/w1280/suopoADq0k8YZr4dQXcU6pToj6s.jpg" alt="Game of Thrones" loading="lazy" />
            <div class="card-glow"></div>
          </div>
          <div class="card-info">
            <span class="card-badge">Series</span>
            <h3>Game of Thrones</h3>
            <p>8 seasons · Epic Fantasy</p>
          </div>
        </div>
        
        <div class="featured-card" data-id="94997" data-type="tv">
          <div class="card-media">
            <img src="https://image.tmdb.org/t/p/w1280/etj8E2o0Bud0HkONVQPjyCkIvpv.jpg" alt="House of the Dragon" loading="lazy" />
            <div class="card-glow"></div>
          </div>
          <div class="card-info">
            <span class="card-badge">Series</span>
            <h3>House of the Dragon</h3>
            <p>2 seasons · Epic Fantasy</p>
          </div>
        </div>
      </div> -->

      <!-- Search results -->
      <div id="searchResults" class="search-results hidden">
        <div class="results-header">
          <h2 id="resultsTitle">Results</h2>
          <span id="resultsCount" class="results-count"></span>
        </div>
        <div id="resultsGrid" class="results-grid"></div>
        <div id="loadMore" class="load-more hidden">
          <button class="btn-glass" id="loadMoreBtn">Load more</button>
        </div>
      </div>
    </section>

    <!-- Detail view (seasons) -->
    <section id="detailView" class="view">
      <div class="detail-header">
        <button class="back-btn" id="backToHome">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Home
        </button>
        <div class="detail-meta">
          <h2 id="detailTitle"></h2>
          <span id="detailType" class="card-badge"></span>
        </div>
      </div>

      <div id="detailContent" class="detail-content"></div>
    </section>

    <!-- Episodes view -->
    <section id="episodesView" class="view">
      <div class="detail-header">
        <button class="back-btn" id="backToSeasons">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Seasons
        </button>
        <h2 id="episodesTitle"></h2>
      </div>
      <div id="episodesContent" class="episodes-content"></div>
    </section>

    <!-- Player view -->
    <section id="playerView" class="view">
      <div class="detail-header">
        <button class="back-btn" id="backToEpisodes">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Episodes
        </button>
        <h2 id="playerTitle"></h2>
        <div class="player-nav">
          <button class="btn-glass" id="prevEp" disabled>‹ Previous</button>
          <button class="btn-glass" id="nextEp" disabled>Next ›</button>
        </div>
      </div>
      <div class="player-wrap">
        <iframe id="playerFrame" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
      </div>
    </section>

  </main>

  <!-- Loading overlay -->
  <div id="loader" class="loader hidden">
    <div class="loader-ring"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
